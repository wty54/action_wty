name: Build Mac App

on: [push]

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: 20260401_orderQR
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Specify the Python version you want to use
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pandas
        pip install python-docx
        pip install docxcompose
    - name: Build with PyInstaller
      run: |
        # 清理之前的构建
        rm -rf dist build
        
        # 构建应用
        pyinstaller gui_output.spec
        
        # 检查构建是否成功
        if [ ! -d "dist/订单信息生成软件.app" ]; then
          echo "❌ Build failed: .app file not found"
          echo "Files in dist directory:"
          ls -la dist/
          exit 1
        fi
        
        echo "✅ Build successful"
    
    - name: Code sign (optional)
      run: |
        # 只在文件存在时进行签名
        if [ -d "dist/订单信息生成软件.app" ]; then
          echo "Signing app..."
          codesign --force --deep --sign - "dist/订单信息生成软件.app"
          echo "✅ Code signing completed"
        else
          echo "⚠️ App not found, skipping code signing"
        fi
    
    - name: Create DMG
      run: |
        # 只在文件存在时创建 DMG
        if [ -d "dist/订单信息生成软件.app" ]; then
          echo "Creating DMG..."
          hdiutil create -volname "订单信息生成软件" \
            -srcfolder "dist/订单信息生成软件.app" \
            -ov -format UDZO \
            "订单信息生成软件.dmg"
          echo "✅ DMG created"
          ls -la *.dmg
        else
          echo "⚠️ App not found, skipping DMG creation"
          exit 1
        fi
    
    - name: List files after build
      run: |
        echo "=== Current directory ($(pwd)) ==="
        ls -la
        
        echo "=== Dist directory ==="
        ls -la dist/ || echo "dist directory not found"
        
        echo "=== DMG files ==="
        ls -la *.dmg 2>/dev/null || echo "No DMG files found"
        
        echo "=== All .app files ==="
        find . -name "*.app" -type d 2>/dev/null || echo "No .app files found"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp
        path: 20260401_orderQR/dist/订单信息生成软件.app
        # 如果需要上传 DMG，可以添加：
        # if-no-files-found: error  # 如果文件不存在则失败
    - name: Test DMG
      run: |
        # 创建测试挂载点
        mkdir -p test_mount
        
        # 挂载 DMG
        hdiutil attach "订单信息生成软件.dmg" -mountpoint test_mount -nobrowse
        
        echo "=== Files in mounted DMG ==="
        ls -la test_mount/
        
        # 动态获取应用名称（支持中英文）
        APP_PATH=$(find test_mount -name "*.app" -maxdepth 1 -type d | head -1)
        
        if [ -n "$APP_PATH" ]; then
          APP_NAME=$(basename "$APP_PATH")
          echo "✅ Found app: $APP_NAME"
          
          # 验证可执行权限
          EXECUTABLE="$APP_PATH/Contents/MacOS/$(basename "$APP_NAME" .app)"
          if [ -f "$EXECUTABLE" ]; then
            echo "✅ Executable found: $EXECUTABLE"
            
            # 检查执行权限
            if [ -x "$EXECUTABLE" ]; then
              echo "✅ Executable has correct permissions"
            else
              echo "⚠️ Executable missing execute permission, fixing..."
              chmod +x "$EXECUTABLE"
            fi
            
            # 运行快速启动测试
            echo "Testing app launch from DMG..."
            timeout 5s "$EXECUTABLE" &
            TEST_PID=$!
            sleep 3
            
            if kill -0 $TEST_PID 2>/dev/null; then
              echo "✅ App launches successfully from DMG"
              kill $TEST_PID
              sleep 1
            else
              echo "⚠️ App exited quickly (may be normal for GUI apps)"
            fi
          else
            echo "❌ Executable not found at expected path: $EXECUTABLE"
            echo "Searching for executable..."
            find "$APP_PATH" -type f -perm +111 -name "$(basename "$APP_NAME" .app)" 2>/dev/null
          fi
        else
          echo "❌ No .app file found in DMG"
          ls -la test_mount/
          hdiutil detach test_mount -force
          exit 1
        fi
        
        # 卸载 DMG
        hdiutil detach test_mount -force
        echo "✅ DMG test completed"
    - name: Upload DMG (optional)
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-DMG
        path: 20260401_orderQR/订单信息生成软件.dmg
        if-no-files-found: ignore

                  
