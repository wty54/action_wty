name: Build Mac App

on: [push]

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: 20260401_orderQR
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Specify the Python version you want to use
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pandas
        pip install python-docx
        pip install docxcompose
    - name: Build with PyInstaller
      run: |
        pyinstaller gui_output.spec
        codesign --force --deep --sign - dist/订单信息生成软件.app
        hdiutil create -volname "订单信息生成软件" -srcfolder dist/订单信息生成软件.app -ov -format UDZO 订单信息生成软件.dmg
    - name: List files after build
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
    
        echo "=== Dist directory ==="
        ls -la dist/ || echo "dist directory not found"
    
        echo "=== All .app files ==="
        find . -name "订单信息生成软件.app" -type d 2>/dev/null || echo "No .app files found"
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp
        path: 20260401_orderQR  # Adjust the path according to your output file name and location
    - name: List directory structure
      run: |
        echo "=== 当前目录结构 ==="
        ls -la
        echo "=== 查找 20260401_orderQR ==="
        find . -name "20260401_orderQR" -type d 2>/dev/null || true

                  
