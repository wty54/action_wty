name: Build and Test Mac App

on: [push]

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: 20260401_orderQR
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas python-docx docxcompose
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --clean gui_output.spec
        chmod -R 755 dist/订单信息生成软件.app
    
    - name: Create DMG
      run: |
        hdiutil create -volname "订单信息生成软件" \
          -srcfolder dist/订单信息生成软件.app \
          -ov -format UDZO \
          "订单信息生成软件.dmg"
    
    - name: Test DMG
      run: |
        # 挂载 DMG
        hdiutil attach "订单信息生成软件.dmg" -mountpoint test_mount -nobrowse
        
        # 查找可执行文件
        EXECUTABLE=$(find test_mount -path "*/Contents/MacOS/*" -type f -perm +111 ! -name "*.so" | head -1)
        
        if [ -n "$EXECUTABLE" ]; then
          echo "✅ Found executable: $(basename "$EXECUTABLE")"
          echo "Testing launch..."
          
          # 尝试启动
          "$EXECUTABLE" &
          PID=$!
          sleep 2
          
          if kill -0 $PID 2>/dev/null; then
            echo "✅ App started successfully"
            kill $PID
          else
            echo "⚠️ App test inconclusive (may still be fine)"
          fi
        else
          echo "❌ No executable found"
          find test_mount -type f | head -20
          hdiutil detach test_mount -force
          exit 1
        fi
        
        hdiutil detach test_mount -force
        echo "✅ DMG test passed"
    
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: OrderInfoGenerator
        path: 20260401_orderQR/订单信息生成软件.dmg

                  
